<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cubic Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>

<body>
    <div class="maindiv">
        <h1>
            Cubic Formula Solver
            <br />
            ax&#179; + bx&#178; + cx + d = 0
        </h1>
        <br />
        <form id="mainform">
            <input for="aname" name="aname" type="number" placeholder="Input A">
            <input for="bname" name="bname" type="number" placeholder="Input B">
            <input for="cname" name="cname" type="number" placeholder="Input C">
            <input for="dname" name="dname" type="number" placeholder="Input D">
            <input type="submit" class="submit-button" value="Calculate">
        </form>
    </div>
    <script src="script.ts"></script>
</body>

</html>
